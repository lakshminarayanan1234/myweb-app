<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dragon Rider Destiny</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    overflow: hidden;
    background: black;
}

body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 50% 50%, #ff4500, #8b0000, black);
    animation: fireMove 10s infinite linear;
    z-index: -1;
}

@keyframes fireMove {
    0% { transform: translate(-10%, -10%) rotate(0deg); }
    50% { transform: translate(-20%, -20%) rotate(180deg); }
    100% { transform: translate(-10%, -10%) rotate(360deg); }
}

.container {
    margin-top: 15%;
}

input {
    padding: 10px;
    font-size: 18px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    background: orange;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: red;
}

#result {
    margin-top: 20px;
    font-size: 24px;
    animation: glow 1s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px yellow; }
    to { text-shadow: 0 0 20px red; }
}
</style>

<script>
function generateDragon() {
    var name = document.getElementById("username").value;
    if(name.trim() === "") {
        alert("Enter your name, brave warrior!");
        return;
    }

    var dragons = [
        "Inferno Blaze",
        "Shadow Flame",
        "Crimson Storm",
        "Night Fury",
        "Ember King",
        "Sky Terror",
        "Obsidian Wing",
        "Thunder Scorch"
    ];

    var index = name.length % dragons.length;
    var dragonName = dragons[index];

    document.getElementById("result").innerHTML =
        "🔥 Warrior " + name +
        ", your destined dragon is: 🐉 " + dragonName + " 🔥";
}
</script>

</head>

<body>

<div class="container">
    <h1>🐉 Dragon Rider Destiny 🔥</h1>
    <p>Enter your name to discover your Dragon!</p>

    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="generateDragon()">Reveal My Dragon</button>

    <div id="result"></div>
</div>

</body>
</html>
